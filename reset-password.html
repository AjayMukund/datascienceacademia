<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Data Science Academia</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0c0e">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="portal.css">
</head>
<body>
<div class="cur" id="cur"></div><canvas id="fluid-canvas"></canvas>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html"><div class="auth-brand-name">Data Science Academia</div><div class="auth-brand-sub">Private Limited &nbsp;&middot;&nbsp; Chennai</div></a>
    </div>
    <h1 class="auth-title">New Password</h1>
    <p class="auth-sub">Choose a strong password for your account.</p>
    <div class="auth-error"   id="err"></div>
    <div class="auth-success" id="ok"></div>
    <form id="form">
      <div class="field-group"><label class="flbl">New Password</label><input type="password" class="fi" id="pass" placeholder="Min. 8 characters" minlength="8" required></div>
      <div class="field-group"><label class="flbl">Confirm Password</label><input type="password" class="fi" id="conf" placeholder="Re-enter password" required></div>
      <button type="submit" class="auth-btn" id="btn">Update Password &nbsp;&rarr;</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="script.js"></script>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn=document.getElementById('btn'), err=document.getElementById('err'), ok=document.getElementById('ok');
  const pass=document.getElementById('pass').value, conf=document.getElementById('conf').value;
  err.style.display='none'; ok.style.display='none';
  if(pass!==conf){ err.textContent='Passwords do not match.'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Updating…';
  const { error } = await supa.auth.updateUser({ password: pass });
  if(error){ err.textContent=error.message; err.style.display='block'; btn.disabled=false; btn.textContent='Update Password →'; }
  else { ok.textContent='Password updated! Redirecting to login…'; ok.style.display='block'; setTimeout(()=>location.href='login.html', 2000); }
});
</script>
</body></html>
