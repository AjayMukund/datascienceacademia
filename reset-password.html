<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Data Science Academia</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0c0e">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="portal.css">
</head>
<body>
<div class="cur" id="cur"></div><canvas id="fluid-canvas"></canvas>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html"><div class="auth-brand-name">Data Science Academia</div><div class="auth-brand-sub">Private Limited &nbsp;&middot;&nbsp; Chennai</div></a>
    </div>
    <h1 class="auth-title">New Password</h1>
    <p class="auth-sub" id="auth-sub">Verifying your reset link…</p>
    <div class="auth-error"   id="err"></div>
    <div class="auth-success" id="ok"></div>
    <form id="form" style="display:none;">
      <div class="field-group"><label class="flbl">New Password</label><input type="password" class="fi" id="pass" placeholder="Min. 8 characters" minlength="8" required></div>
      <div class="field-group"><label class="flbl">Confirm Password</label><input type="password" class="fi" id="conf" placeholder="Re-enter password" required></div>
      <button type="submit" class="auth-btn" id="btn">Update Password &nbsp;&rarr;</button>
    </form>
    <p style="margin-top:1.25rem;text-align:center;"><a href="forgot-password.html" class="auth-link" id="retry-link" style="display:none;">← Request a new reset link</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="script.js"></script>
<script>
const errEl  = document.getElementById('err');
const okEl   = document.getElementById('ok');
const form   = document.getElementById('form');
const subEl  = document.getElementById('auth-sub');
const retry  = document.getElementById('retry-link');

function showErr(msg) {
  errEl.textContent = msg; errEl.style.display = 'block';
  subEl.textContent = '';
  retry.style.display = 'inline';
}

let formReady = false;
function showForm() {
  if (formReady) return;
  formReady = true;
  clearTimeout(guard);
  subEl.textContent = 'Choose a strong password for your account.';
  form.style.display = 'block';
}

// Path 1: event fires after listener registered (most common)
supa.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && location.hash.includes('type=recovery'))) {
    showForm();
  }
});

// Path 2: Supabase already processed the token before our listener registered
(async () => {
  if (location.hash.includes('type=recovery')) {
    const { data: { session } } = await supa.auth.getSession();
    if (session) showForm();
  }
})();

// Timeout: link expired or invalid
const guard = setTimeout(async () => {
  if (formReady) return;
  const { data: { session } } = await supa.auth.getSession();
  if (!session) {
    showErr('This reset link has expired or already been used. Please request a new one.');
  }
}, 5000);

form.addEventListener('submit', async e => {
  e.preventDefault();
  clearTimeout(guard);
  const pass = document.getElementById('pass').value;
  const conf = document.getElementById('conf').value;
  errEl.style.display = 'none'; okEl.style.display = 'none';
  if (pass !== conf) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Updating…';
  const { error } = await supa.auth.updateUser({ password: pass });
  if (error) {
    errEl.textContent = error.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Update Password →';
  } else {
    await supa.auth.signOut();
    okEl.textContent = 'Password updated! Redirecting to sign in…';
    okEl.style.display = 'block';
    setTimeout(() => location.href = 'login.html', 2000);
  }
});
</script>
</body></html>
