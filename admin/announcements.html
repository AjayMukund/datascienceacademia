<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Announcements — Admin — Data Science Academia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../portal.css">
</head>
<body>
<div class="cur" id="cur"></div><canvas id="fluid-canvas"></canvas>
<div class="portal-body">

<aside class="portal-sidebar" id="sidebar">
  <div class="sidebar-brand"><a href="../index.html"><div class="sidebar-brand-name">Data Science Academia</div><div class="sidebar-brand-sub">Admin Panel</div></a></div>
  <nav class="portal-nav">
    <div class="portal-nav-section">Overview</div>
    <a href="dashboard.html"><span class="nav-icon">⊞</span> Dashboard</a>
    <div class="portal-nav-section">Management</div>
    <a href="students.html"><span class="nav-icon">👥</span> Students</a>
    <a href="courses.html"><span class="nav-icon">📚</span> Courses</a>
    <div class="portal-nav-section">Communication</div>
    <a href="announcements.html" class="active"><span class="nav-icon">📢</span> Announcements</a>
    <a href="certificates.html"><span class="nav-icon">🏅</span> Certificates</a>
    <div class="portal-nav-section">Site</div>
    <a href="../index.html" target="_blank"><span class="nav-icon">🌐</span> View Website</a>
  </nav>
  <div class="sidebar-user">
    <div class="sidebar-user-info"><div class="sidebar-avatar portal-avatar">A</div><div><div class="sidebar-user-name portal-username">Loading…</div><div class="sidebar-user-role portal-role">Administrator</div></div></div>
    <button class="portal-logout">→ Sign Out</button>
  </div>
</aside>

<main class="portal-main">
  <div class="portal-topbar">
    <div><div class="portal-page-title">Announcements</div><div class="portal-page-sub">Broadcast messages to all students</div></div>
    <div style="display:flex;gap:.75rem;">
      <button class="portal-btn" onclick="openModal()">+ New Announcement</button>
      <button class="portal-mob-tog" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    </div>
  </div>

  <div id="list"></div>
</main>
</div>

<!-- New Announcement Modal -->
<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">New Announcement</div>
    <div class="modal-sub">This will be visible to all enrolled students.</div>
    <div class="field-group"><label class="flbl">Title</label><input type="text" class="fi" id="m-title" placeholder="e.g. Holiday Schedule Update"></div>
    <div class="field-group"><label class="flbl">Message</label><textarea class="fi" id="m-body" rows="4" placeholder="Write your announcement here…" style="resize:vertical;"></textarea></div>
    <div id="m-error" class="auth-error"></div>
    <div class="modal-actions">
      <button class="portal-btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="portal-btn" onclick="publish()">Publish →</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/portal.js"></script>
<script src="../script.js"></script>
<script>
function toast(m,t='success'){const el=document.createElement('div');el.className=`toast-item ${t}`;el.textContent=m;document.getElementById('toast').appendChild(el);setTimeout(()=>el.remove(),3500);}
function openModal(){document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}

document.addEventListener('portal:ready', loadAnnouncements);

async function loadAnnouncements(){
  const {data,error}=await supa.from('announcements').select('*').order('created_at',{ascending:false});
  const list=document.getElementById('list');
  if(error||!data?.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">📢</div><div class="empty-title">No announcements yet</div><div class="empty-sub">Create one to notify all students.</div></div>`;
    return;
  }
  list.innerHTML=data.map(a=>`
    <div class="editor-card" style="margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;">
        <div>
          <div style="font-family:var(--fd);font-size:1.2rem;font-weight:600;color:var(--cream);margin-bottom:.35rem;">${a.title}</div>
          <div style="font-family:var(--fb);font-size:.8rem;color:var(--fog2);">${new Date(a.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <button class="icon-btn danger" onclick="del('${a.id}')">🗑</button>
      </div>
      <div style="font-family:var(--fb);font-size:.88rem;color:var(--fog);line-height:1.75;margin-top:.85rem;padding-top:.85rem;border-top:1px solid var(--border);">${a.body.replace(/\n/g,'<br>')}</div>
    </div>`).join('');
}

async function publish(){
  const title=document.getElementById('m-title').value.trim();
  const body=document.getElementById('m-body').value.trim();
  const errEl=document.getElementById('m-error');
  errEl.style.display='none';
  if(!title||!body){errEl.textContent='Title and message are required.';errEl.style.display='block';return;}
  const {error}=await supa.from('announcements').insert({title,body,created_by:window._user.id});
  if(error){errEl.textContent=error.message;errEl.style.display='block';return;}
  toast('Announcement published');
  closeModal();
  document.getElementById('m-title').value='';
  document.getElementById('m-body').value='';
  await loadAnnouncements();
}

async function del(id){
  if(!confirm('Delete this announcement?'))return;
  const {error}=await supa.from('announcements').delete().eq('id',id);
  error?toast(error.message,'error'):(toast('Deleted'),loadAnnouncements());
}
</script>
</body></html>
