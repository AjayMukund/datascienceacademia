<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Data Science Academia</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0c0e">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="portal.css">
</head>
<body>
<div class="cur" id="cur"></div><canvas id="fluid-canvas"></canvas>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <a href="index.html"><div class="auth-brand-name">Data Science Academia</div><div class="auth-brand-sub">Private Limited &nbsp;&middot;&nbsp; Chennai</div></a>
    </div>
    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
    <div class="auth-error"   id="err"></div>
    <div class="auth-success" id="ok"></div>
    <form id="form">
      <div class="field-group"><label class="flbl">Email Address</label><input type="email" class="fi" id="email" placeholder="you@example.com" required></div>
      <button type="submit" class="auth-btn" id="btn">Send Reset Link &nbsp;&rarr;</button>
    </form>
    <p class="auth-switch" style="margin-top:1.25rem;"><a href="login.html" class="auth-link">← Back to Sign In</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="script.js"></script>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn=document.getElementById('btn'), err=document.getElementById('err'), ok=document.getElementById('ok');
  err.style.display='none'; ok.style.display='none';
  btn.disabled=true; btn.textContent='Sending…';
  const base = location.origin + location.pathname.replace('forgot-password.html','');
  const { error } = await supa.auth.resetPasswordForEmail(
    document.getElementById('email').value.trim(),
    { redirectTo: base + 'reset-password.html' }
  );
  if(error){ err.textContent=error.message; err.style.display='block'; }
  else { ok.textContent='Reset link sent! Check your email inbox.'; ok.style.display='block'; }
  btn.disabled=false; btn.textContent='Send Reset Link →';
});
</script>
</body></html>
